        // 5. INTERZEPTION DER TOUCH-PIPELINE GEGEN ACCIDENTAL PLACEMENTS
        hookEngineTouchControls() {
            // Pointerclick abfangen: Klicks blockieren, wenn wir im reinen Kamera-Modus auf dem Handy sind
            const basePointerClick = Engine3D.onPointerClick;
            Engine3D.onPointerClick = function(e) {
                if (TouchOptimizer.isMobileLayout && TouchOptimizer.touchMode === 'camera') {
                    return; // Im Kamera-Modus wird durch Taps kein Stein gebaut oder zerstört!
                }
                basePointerClick.call(Engine3D, e);
            };

            // MouseMove/TouchMove abfangen: Vorschau-Stein folgt dem Finger nur im Bauen-Modus
            const baseMouseMove = Engine3D.onMouseMove;
            Engine3D.onMouseMove = function(e) {
                if (TouchOptimizer.isMobileLayout && TouchOptimizer.touchMode === 'camera') {
                    if(Engine3D.previewMesh) Engine3D.previewMesh.visible = false;
                    return;
                }
                baseMouseMove.call(Engine3D, e);
            };

            // Beim Wechseln der Tools über die untere Werkzeugleiste automatisch in den richtigen Touch-Modus schalten
            const baseSetTool = App.setTool;
            App.setTool = function(tool) {
                baseSetTool.call(App, tool);
                if (TouchOptimizer.isMobileLayout) {
                    if (tool === 'place' || tool === 'paint' || tool === 'delete') {
                        TouchOptimizer.setTouchMode('action'); // Sofort in Action-Modus wechseln
                    }
                }
                TouchOptimizer.closeAllMenus();
            };
        },

        listenToResize() {
            window.addEventListener('resize', () => {
                const isMobileNow = window.innerWidth < 1024;
                if (isMobileNow !== this.isMobileLayout) {
                    this.isMobileLayout = isMobileNow;
                    this.applyInitialState();
                }
            });
        },

        applyInitialState() {
            const bar = document.getElementById('mobile-interaction-mode-bar');
            if (this.isMobileLayout) {
                if(bar) bar.classList.remove('hidden');
                this.setTouchMode('camera'); // Standardmäßig mit Drehen starten auf Mobile
                this.closeAllMenus();
            } else {
                if(bar) bar.classList.add('hidden');
                Engine3D.controls.enabled = true;
                if(Engine3D.previewMesh) Engine3D.previewMesh.visible = (App.activeTool === 'place');
                // Auf Desktop Menüs wieder normal einblenden
                document.getElementById('sidebar-left').classList.remove('-translate-x-full');
                document.getElementById('sidebar-right').classList.remove('translate-x-full');
            }
        }
    };

    // Starten des mobilen Usability-Systems
    TouchOptimizer.init();
})();

    menuBtn.className = "w-11 h-11 bg-slate-50 hover:bg-slate-100 active:bg-slate-200 text-slate-700 rounded-xl transition-all flex items-center justify-center text-lg border border-slate-200 cursor-pointer lg:hidden";
    menuBtn.title = "Mehr Optionen";
    menuBtn.innerHTML = '<i class="fa-solid fa-ellipsis-vertical"></i>';
    
    // Toggle-Mechanismus
    menuBtn.onclick = (e) => {
        e.stopPropagation();
        dropdown.classList.toggle('hidden');
        SoundFX.play('click');
    };
    if (headerControls) {
        headerControls.appendChild(menuBtn);
    }

    // 4. SMARTES AUTO-CLOSE BEI KLICKS AUSSERHALB
    document.addEventListener('pointerdown', (e) => {
        if (!dropdown.contains(e.target) && !menuBtn.contains(e.target)) {
            dropdown.classList.add('hidden');
        }
    });
})();

// =========================================================================
// BRICKCRAFT STUDIO - MOBILE OPTIMIZER (ANTI-CRASH TIMING VALVE)
// =========================================================================

(function() {
    console.log("📱 Aktiviere mobilen Optimierer mit intelligenter Lade-Überwachung...");

    // 1. NATIVE STYLES ERGÄNZEN
    const style = document.createElement('style');
    style.innerHTML = `
        @media (max-width: 1023px) {
            #sidebar-left, #sidebar-right {
                position: fixed !important; top: 0 !important; bottom: 0 !important; height: 100vh !important;
                z-index: 40 !important; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25) !important;
                background-color: white !important; transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1) !important;
            }
            #sidebar-left { left: 0 !important; width: 85% !important; max-width: 340px !important; }
            #sidebar-right { right: 0 !important; width: 85% !important; max-width: 320px !important; }
            #color-grid button { height: 52px !important; width: 52px !important; margin: 0 auto !important; }
            #brick-list > div { padding: 1rem !important; margin-bottom: 0.5rem !important; }
        }
        .mobile-backdrop { position: fixed; inset: 0; background: rgba(15, 23, 42, 0.4); backdrop-filter: blur(2px); z-index: 30; }
    `;
    document.head.appendChild(style);

    // FUNKTIONEN FÜR DAS HEADER-DROPDOWN BEREITSTELLEN
    App.toggleMobileMenu = function(e) {
        if(e) e.stopPropagation();
        const dd = document.getElementById('mobile-action-dropdown');
        if(dd) dd.classList.toggle('hidden');
    };

    document.addEventListener('pointerdown', (e) => {
        const dd = document.getElementById('mobile-action-dropdown');
        const trigger = document.getElementById('mobile-more-trigger');
        if (dd && !dd.contains(e.target) && trigger && !trigger.contains(e.target)) {
            dd.classList.add('hidden');
        }
    });

    window.TouchOptimizer = {
        touchMode: 'camera',
        isMobileLayout: window.innerWidth < 1024,

        init() {
            this.createMobileMenuToggles();
            this.createInteractionSwitcher();
            this.hookEngineTouchControls();
            this.listenToResize();
            
            // Startet die Überwachung
            this.applyInitialState();
        },

        createMobileMenuToggles() {
            if(!document.getElementById('mobile-menu-backdrop')) {
                const backdrop = document.createElement('div');
                backdrop.id = 'mobile-menu-backdrop';
                backdrop.className = 'mobile-backdrop hidden';
                backdrop.onclick = () => TouchOptimizer.closeAllMenus();
                document.body.appendChild(backdrop);
            }

            if(!document.getElementById('toggle-menu-left')) {
                const toggleLeft = document.createElement('button');
                toggleLeft.id = 'toggle-menu-left';
                toggleLeft.className = 'lg:hidden fixed bottom-6 left-6 z-30 w-14 h-14 bg-white border border-slate-200 text-slate-700 rounded-2xl shadow-xl flex items-center justify-center text-xl cursor-pointer';
                toggleLeft.innerHTML = '<i class="fa-solid fa-shapes"></i>';
                toggleLeft.onclick = () => this.toggleMenu('left');
                document.body.appendChild(toggleLeft);
            }

            if(!document.getElementById('toggle-menu-right')) {
                const toggleRight = document.createElement('button');
                toggleRight.id = 'toggle-menu-right';
                toggleRight.className = 'lg:hidden fixed bottom-6 right-6 z-30 w-14 h-14 bg-white border border-slate-200 text-slate-700 rounded-2xl shadow-xl flex items-center justify-center text-xl cursor-pointer';
                toggleRight.innerHTML = '<i class="fa-solid fa-palette"></i>';
                toggleRight.onclick = () => this.toggleMenu('right');
                document.body.appendChild(toggleRight);
            }
        },

        toggleMenu(side) {
            const panel = document.getElementById(`sidebar-${side==='left'?'left':'right'}`);
            const otherPanel = document.getElementById(`sidebar-${side==='left'?'right':'left'}`);
            const backdrop = document.getElementById('mobile-menu-backdrop');
            otherPanel.classList.add(side==='left'?'translate-x-full':'-translate-x-full');
            if (panel.classList.contains(side==='left'?'-translate-x-full':'translate-x-full')) {
                panel.classList.remove(side==='left'?'-translate-x-full':'translate-x-full');
                backdrop.classList.remove('hidden');
            } else {
                panel.classList.add(side==='left'?'-translate-x-full':'translate-x-full');
                backdrop.classList.add('hidden');
            }
            if(window.SoundFX) SoundFX.play('click');
        },

        closeAllMenus() {
            document.getElementById('sidebar-left').classList.add('-translate-x-full');
            document.getElementById('sidebar-right').classList.add('translate-x-full');
            const bd = document.getElementById('mobile-menu-backdrop');
            if(bd) bd.classList.add('hidden');
        },

        createInteractionSwitcher() {
            let switcher = document.getElementById('mobile-interaction-mode-bar');
            if(!switcher) {
                switcher = document.createElement('div');
                switcher.id = 'mobile-interaction-mode-bar';
                document.body.appendChild(switcher);
            }
            switcher.className = 'lg:hidden fixed bottom-24 left-1/2 transform -translate-x-1/2 z-30 bg-slate-900/95 p-1.5 rounded-2xl shadow-2xl flex items-center border border-slate-700/50 backdrop-blur';
            switcher.innerHTML = `
                <button id="touch-btn-camera" onclick="TouchOptimizer.setTouchMode('camera')" class="px-4 py-2.5 rounded-xl font-bold text-xs tracking-wider flex items-center gap-2 transition-all cursor-pointer text-white bg-indigo-600 shadow-md">
                    <i class="fa-solid fa-camera text-sm"></i> DREHEN
                </button>
                <button id="touch-btn-action" onclick="TouchOptimizer.setTouchMode('action')" class="px-4 py-2.5 rounded-xl font-bold text-xs tracking-wider flex items-center gap-2 transition-all cursor-pointer text-slate-400 hover:text-white">
                    <i class="fa-solid fa-bolt text-sm"></i> BAUEN
                </button>
            `;
        },

        setTouchMode(mode) {
            this.touchMode = mode;
            const btnCam = document.getElementById('touch-btn-camera');
            const btnAct = document.getElementById('touch-btn-action');
            if(!btnCam || !btnAct) return;

            // Sichere Abfrage über die Existenz der 3D-Kamera-Komponenten
            const hasControls = (window.Engine3D && window.Engine3D.controls);

            if (mode === 'camera') {
                btnCam.className = "px-4 py-2.5 rounded-xl font-bold text-xs tracking-wider flex items-center gap-2 transition-all cursor-pointer text-white bg-indigo-600 shadow-md";
                btnAct.className = "px-4 py-2.5 rounded-xl font-bold text-xs tracking-wider flex items-center gap-2 transition-all cursor-pointer text-slate-400 hover:text-white";
                if(hasControls) Engine3D.controls.enabled = true;
                if(Engine3D && Engine3D.previewMesh) Engine3D.previewMesh.visible = false;
            } else {
                btnAct.className = "px-4 py-2.5 rounded-xl font-bold text-xs tracking-wider flex items-center gap-2 transition-all cursor-pointer text-white bg-indigo-600 shadow-md";
                btnCam.className = "px-4 py-2.5 rounded-xl font-bold text-xs tracking-wider flex items-center gap-2 transition-all cursor-pointer text-slate-400 hover:text-white";
                if(hasControls) Engine3D.controls.enabled = false;
                if(Engine3D && Engine3D.previewMesh && App.activeTool === 'place') Engine3D.previewMesh.visible = true;
            }
            if(window.SoundFX) SoundFX.play('click');
        },

        hookEngineTouchControls() {
            const basePointerClick = Engine3D.onPointerClick;
            Engine3D.onPointerClick = function(e) {
                if (TouchOptimizer.isMobileLayout && TouchOptimizer.touchMode === 'camera') return;
                basePointerClick.call(Engine3D, e);
            };

            const baseMouseMove = Engine3D.onMouseMove;
            Engine3D.onMouseMove = function(e) {
                if (TouchOptimizer.isMobileLayout && TouchOptimizer.touchMode === 'camera') {
                    if(Engine3D.previewMesh) Engine3D.previewMesh.visible = false;
                    return;
                }
                baseMouseMove.call(Engine3D, e);
            };

            const baseSetTool = App.setTool;
            App.setTool = function(tool) {
                baseSetTool.call(App, tool);
                if (TouchOptimizer.isMobileLayout && ['place', 'paint', 'delete'].includes(tool)) {
                    TouchOptimizer.setTouchMode('action');
                }
                TouchOptimizer.closeAllMenus();
            };
        },

        listenToResize() {
            window.addEventListener('resize', () => {
                const isMobileNow = window.innerWidth < 1024;
                if (isMobileNow !== this.isMobileLayout) {
                    this.isMobileLayout = isMobileNow;
                    this.applyInitialState();
                }
            });
        },

        // KORREKTUR: Wenn die Steuerung noch lädt, wartet die Funktion sicherheitshalber
        applyInitialState() {
            const bar = document.getElementById('mobile-interaction-mode-bar');
            
            if (!window.Engine3D || !window.Engine3D.controls) {
                setTimeout(() => this.applyInitialState(), 50);
                return;
            }

            if (this.isMobileLayout) {
                if(bar) bar.classList.remove('hidden');
                this.setTouchMode('camera');
                this.closeAllMenus();
            } else {
                if(bar) bar.classList.add('hidden');
                Engine3D.controls.enabled = true;
                if(Engine3D.previewMesh) Engine3D.previewMesh.visible = (App.activeTool === 'place');
                document.getElementById('sidebar-left').classList.remove('-translate-x-full');
                document.getElementById('sidebar-right').classList.remove('translate-x-full');
            }
        }
    };

    TouchOptimizer.init();
})();


// =========================================================================
// BRICKCRAFT STUDIO - VISUAL VISUAL BRICK SELECTION GRID (SOTA 2026)
// =========================================================================

(function() {
    console.log("🎨 Aktiviere visuelle Steinauswahl: Generiere 3D-Vorschau-Bilder...");

    // 1. CSS FÜR DAS NEUE RASTER-DESIGN INJIZIEREN
    const gridStyle = document.createElement('style');
    gridStyle.innerHTML = `
        /* Verwandelt die öde Textliste in ein hochmodernes Lego-Vorschau-Raster */
        #brick-list {
            display: grid !important;
            grid-template-columns: repeat(3, minmax(0, 1fr)) !important;
            gap: 0.5rem !important;
            padding: 0.75rem !important;
        }
        
        .brick-gallery-item {
            background-color: #f8fafc;
            border: 1px solid rgba(226, 232, 240, 0.8);
            border-radius: 0.75rem;
            padding: 0.35rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            aspect-ratio: 1 / 1;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
            position: relative;
        }
        
        .brick-gallery-item:hover {
            background-color: #f1f5f9;
            border-color: #cbd5e1;
            transform: scale(1.02);
        }
        
        .brick-gallery-item.active {
            background-color: #eef2ff;
            border-color: #6366f1;
            box-shadow: 0 0 0 2px #e0e7ff;
        }
        
        .brick-gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            pointer-events: none;
            filter: drop-shadow(0 2px 4px rgba(15, 23, 42, 0.06));
        }
    `;
    document.head.appendChild(gridStyle);

    // 2. DER OFFSCREEN-FOTOSTUDIO-GENERATOR (Erstellt die Bilder live im RAM)
    const generateThumbnail = (brickId) => {
        const size = 80;
        const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
        renderer.setSize(size, size);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

        const scene = new THREE.Scene();
        
        // Isometrische Kamera für den klassischen Katalog-Look
        const camera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0.1, 100);
        camera.position.set(2, 1.6, 2);
        camera.lookAt(0, 0.1, 0);

        // Perfekte Studio-Beleuchtung aufbauen, damit Noppen Plastik-Schatten werfen
        const ambient = new THREE.AmbientLight(0xffffff, 0.65); scene.add(ambient);
        const sun = new THREE.DirectionalLight(0xffffff, 0.75); sun.position.set(3, 5, 1); scene.add(sun);

        // Bauteil aus der Fabrik anfordern
        const brickMesh = GeometryFactory.create(brickId);
        if (!brickMesh) return '';

        // Neutrales, edles Studio-Grau für Standardsteine zuweisen (Spezial-Effekte der Extensions bleiben erhalten!)
        const defaultMat = new THREE.MeshStandardMaterial({ color: 0xcbd5e1, roughness: 0.4, metalness: 0.1 });
        brickMesh.traverse(child => {
            if (child.isMesh) {
                if (!child.material.transparent && child.material.emissiveIntensity <= 1 && !child.material.map) {
                    child.material = defaultMat;
                }
            }
        });

        scene.add(brickMesh);

        // INTELLIGENTES SIZING: Zentriert und skaliert jeden Stein automatisch in den Fotorahmen
        const box = new THREE.Box3().setFromObject(brickMesh);
        const center = new THREE.Vector3(); box.getCenter(center);
        const boxSize = new THREE.Vector3(); box.getSize(boxSize);
        
        brickMesh.position.sub(center); // Auf Nullpunkt setzen
        if(brickId.includes('lamp') || brickId.includes('traffic')) brickMesh.position.y -= 0.2; // Größere Masten leicht absenken

        const maxDim = Math.max(boxSize.x, boxSize.y, boxSize.z);
        const scaleFactor = 1.25 / maxDim;
        brickMesh.scale.setScalar(scaleFactor);

        // Foto schießen
        renderer.render(scene, camera);
        const dataURL = renderer.domElement.toDataURL();
        
        // Ressourcen sauber aufräumen
        renderer.dispose();
        return dataURL;
    };

    // Bild-Zwischenspeicher (verhindert Ruckeln beim Reiterwechsel)
    const thumbnailCache = {};

    // 3. UI-PIPELINE KAPERN UND NEU STRUKTURIEREN
    if (window.UIManager) {
        UIManager.renderBricks = function(category) {
            const container = document.getElementById('brick-list');
            if (!container) return;
            container.innerHTML = '';

            // Filter die Bausteine der gewählten Kategorie
            const filteredBricks = Object.keys(Registry.bricks).filter(id => Registry.bricks[id].category === category);

            filteredBricks.forEach(id => {
                const config = Registry.bricks[id];
                
                // Falls das Bild noch nicht gerendert wurde, jetzt live "fotografieren"
                if (!thumbnailCache[id]) {
                    thumbnailCache[id] = generateThumbnail(id);
                }

                // Erstelle den Raster-Button
                const tile = document.createElement('button');
                tile.className = `brick-gallery-item ${App.activeBrickId === id ? 'active' : ''}`;
                tile.title = config.name; // Name erscheint als eleganter Tooltip beim Drüberhalten
                
                // Bild einbetten
                if (thumbnailCache[id]) {
                    const img = document.createElement('img');
                    img.src = thumbnailCache[id];
                    img.alt = config.name;
                    tile.appendChild(img);
                } else {
                    tile.innerText = '🧱';
                }

                // Klick-Logik: Stein aktivieren
                tile.onclick = () => {
                    App.activeBrickId = id;
                    document.querySelectorAll('.brick-gallery-item').forEach(el => el.classList.remove('active'));
                    tile.classList.add('active');
                    if (window.SoundFX) SoundFX.play('click');
                    
                    // Schließt auf mobilen Geräten die Schublade nach Auswahl automatisch
                    if (window.TouchOptimizer && TouchOptimizer.isMobileLayout) {
                        TouchOptimizer.closeAllMenus();
                    }
                };

                container.appendChild(tile);
            });
        };
    }

    // Sofortige Erstberechnung ausführen
    if (window.UIManager && window.App) {
        UIManager.renderBricks(App.activeCategory || 'standard');
    }

    console.log("💚 Das visuelle 3D-Vorschau-Raster steht im linken Kontrollzentrum bereit!");
})();

    </script>
