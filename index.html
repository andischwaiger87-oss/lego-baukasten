<!DOCTYPE html>
<html lang="de" class="h-full bg-slate-50 text-slate-900">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lego Baukasten</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    
    <style>
        body { 
            font-family: 'Inter', system-ui, sans-serif;
            overflow: hidden;
        }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>
<body class="h-full flex flex-col antialiased select-none bg-slate-50 p-4 gap-4">

    <header class="bg-white border border-slate-200/80 px-4 py-3 flex items-center justify-between z-10 shrink-0 rounded-2xl shadow-sm relative">
    <div class="flex items-center space-x-2">
        <span class="text-xl md:text-2xl">🧱</span>
        <h1 class="font-bold text-lg md:text-xl tracking-tight text-slate-900">Lego <span class="text-indigo-600">Baukasten</span></h1>
    </div>

    <div class="flex items-center space-x-1.5">
        <button onclick="App.undo()" class="w-10 h-10 bg-slate-50 hover:bg-slate-100 text-slate-700 rounded-xl transition-all flex items-center justify-center border border-slate-200 cursor-pointer" title="Rückgängig">
            <i class="fa-solid fa-arrow-rotate-left text-sm"></i>
        </button>
        <button onclick="App.redo()" class="w-10 h-10 bg-slate-50 hover:bg-slate-100 text-slate-700 rounded-xl transition-all flex items-center justify-center border border-slate-200 cursor-pointer" title="Wiederholen">
            <i class="fa-solid fa-arrow-rotate-right text-sm"></i>
        </button>
        
        <div class="hidden lg:flex items-center space-x-1.5">
            <div class="h-5 w-[1px] bg-slate-200 mx-1"></div>
            <label class="w-10 h-10 bg-slate-50 hover:bg-slate-100 text-slate-700 rounded-xl transition-all flex items-center justify-center border border-slate-200 cursor-pointer" title="Modell öffnen (Import)">
                <i class="fa-solid fa-upload text-sm"></i>
                <input type="file" id="import-file" class="hidden" accept=".json" onchange="App.importJSON(event)">
            </label>
            <button onclick="App.exportJSON()" class="w-10 h-10 bg-slate-50 hover:bg-slate-100 text-slate-700 rounded-xl transition-all flex items-center justify-center border border-slate-200 cursor-pointer" title="Modell speichern (Export)">
                <i class="fa-solid fa-download text-sm"></i>
            </button>
            <div class="h-5 w-[1px] bg-slate-200 mx-1"></div>
            <button onclick="App.clearScene()" class="w-10 h-10 bg-rose-50 hover:bg-rose-100 text-rose-600 rounded-xl transition-all flex items-center justify-center border border-rose-100 cursor-pointer" title="Spielfeld leeren">
                <i class="fa-solid fa-trash-can text-sm"></i>
            </button>
        </div>

        <button id="mobile-more-trigger" onclick="App.toggleMobileMenu(event)" class="lg:hidden w-10 h-10 bg-slate-50 hover:bg-slate-100 text-slate-700 rounded-xl transition-all flex items-center justify-center border border-slate-200 cursor-pointer">
            <i class="fa-solid fa-ellipsis-vertical text-sm"></i>
        </button>
    </div>

    <div id="mobile-action-dropdown" class="hidden absolute right-4 top-16 w-56 bg-white border border-slate-200 rounded-2xl shadow-xl p-1.5 z-50 flex flex-col gap-0.5">
        <button onclick="document.getElementById('import-file').click(); App.toggleMobileMenu();" class="w-full px-3.5 py-2.5 text-left text-xs font-semibold text-slate-700 hover:bg-slate-50 rounded-xl flex items-center cursor-pointer">
            <i class="fa-solid fa-upload text-slate-400 w-5 mr-2 text-sm"></i> Modell öffnen (Import)
        </button>
        <button onclick="App.exportJSON(); App.toggleMobileMenu();" class="w-full px-3.5 py-2.5 text-left text-xs font-semibold text-slate-700 hover:bg-slate-50 rounded-xl flex items-center cursor-pointer">
            <i class="fa-solid fa-download text-slate-400 w-5 mr-2 text-sm"></i> Modell speichern (Export)
        </button>
        <div class="h-[1px] bg-slate-100 my-1 mx-2"></div>
        <button onclick="App.clearScene(); App.toggleMobileMenu();" class="w-full px-3.5 py-2.5 text-left text-xs font-semibold text-rose-600 hover:bg-rose-50 rounded-xl flex items-center cursor-pointer">
            <i class="fa-solid fa-trash-can text-rose-400 w-5 mr-2 text-sm"></i> Spielfeld leeren
        </button>
    </div>
</header>

    <div class="flex-1 flex overflow-hidden relative gap-4">

        <aside id="sidebar-left" class="w-80 bg-white border border-slate-200/80 rounded-2xl flex flex-col z-10 transition-all duration-300 absolute md:static inset-y-0 left-0 transform -translate-x-full md:translate-x-0 shadow-sm">
            <div class="p-4 border-b border-slate-100">
                <h2 class="font-semibold text-base text-slate-900">Bausteine</h2>
            </div>
            <div class="p-3 bg-slate-50/50 flex flex-wrap gap-1.5 border-b border-slate-100" id="category-tabs"></div>
            <div class="flex-1 overflow-y-auto p-4 space-y-2" id="brick-list"></div>
        </aside>

        <main class="flex-1 relative flex flex-col overflow-hidden bg-white border border-slate-200/80 rounded-2xl shadow-sm">
            <div class="absolute top-4 right-4 z-10 flex space-x-1 bg-white/90 p-1 rounded-xl border border-slate-200 shadow-sm backdrop-blur">
                <button onclick="Engine3D.setView('iso')" class="p-2 hover:bg-slate-100 text-slate-700 rounded-lg text-sm font-semibold transition-colors cursor-pointer" title="3D Drehen"><i class="fa-solid fa-cube"></i></button>
                <button onclick="Engine3D.setView('top')" class="p-2 hover:bg-slate-100 text-slate-700 rounded-lg text-sm font-semibold transition-colors cursor-pointer" title="Von Oben"><i class="fa-solid fa-border-all"></i></button>
            </div>

            <div class="absolute bottom-6 left-1/2 transform -translate-x-1/2 z-10 bg-slate-900/95 p-2 rounded-2xl shadow-xl flex space-x-2 backdrop-blur">
                <button id="tool-place" onclick="App.setTool('place')" class="w-14 h-14 rounded-xl flex items-center justify-center transition-all bg-indigo-600 text-white cursor-pointer shadow-lg" title="Bauen">
                    <i class="fa-solid fa-hammer text-xl"></i>
                </button>
                <button id="tool-paint" onclick="App.setTool('paint')" class="w-14 h-14 rounded-xl flex items-center justify-center transition-all text-slate-400 hover:text-white cursor-pointer" title="Färben">
                    <i class="fa-solid fa-paint-roller text-xl"></i>
                </button>
                <button id="tool-delete" onclick="App.setTool('delete')" class="w-14 h-14 rounded-xl flex items-center justify-center transition-all text-slate-400 hover:text-white cursor-pointer" title="Löschen">
                    <i class="fa-solid fa-bomb text-xl"></i>
                </button>
            </div>

            <div id="canvas-container" class="w-full h-full cursor-grab active:cursor-grabbing"></div>

            <div id="instruction-panel" class="hidden absolute inset-x-6 top-6 bg-slate-900 text-white p-4 rounded-xl shadow-xl flex items-center justify-between z-20">
                <button onclick="Instructions.prevStep()" class="w-11 h-11 bg-slate-800 hover:bg-slate-700 text-white rounded-lg flex items-center justify-center cursor-pointer"><i class="fa-solid fa-chevron-left"></i></button>
                <span id="instruction-step-text" class="text-sm font-medium tracking-wide">SCHRITT 1</span>
                <button onclick="Instructions.nextStep()" class="w-11 h-11 bg-slate-800 hover:bg-slate-700 text-white rounded-lg flex items-center justify-center cursor-pointer"><i class="fa-solid fa-chevron-right"></i></button>
                <button onclick="Instructions.stop()" class="h-10 px-4 bg-emerald-600 hover:bg-emerald-500 text-white font-medium rounded-lg text-sm cursor-pointer transition-colors">Fertig</button>
            </div>
        </main>

        <aside id="sidebar-right" class="w-72 bg-white border border-slate-200/80 rounded-2xl flex flex-col z-10 transition-all duration-300 absolute lg:static inset-y-0 right-0 transform translate-x-full lg:translate-x-0 shadow-sm">
            <div class="p-4 border-b border-slate-100">
                <h2 class="font-semibold text-base text-slate-900">Farben</h2>
            </div>
            
            <div class="flex-1 overflow-y-auto p-4 flex flex-col justify-between gap-4">
                <div class="grid grid-cols-4 gap-2.5" id="color-grid"></div>

                <div id="blueprint-area" class="hidden">
                    <span class="text-xs font-semibold text-slate-400 uppercase tracking-wider block mb-2">Vorlagen</span>
                    <div id="blueprint-grid" class="grid grid-cols-1 gap-1.5"></div>
                </div>

                <div class="pt-3 border-t border-slate-100">
                    <button onclick="Instructions.start()" class="w-full py-3.5 bg-slate-900 hover:bg-slate-800 text-white font-semibold rounded-xl shadow-sm transition-all text-sm tracking-wide flex items-center justify-center gap-2 cursor-pointer">
                        <i class="fa-solid fa-book-open text-base"></i> Bauanleitung
                    </button>
                </div>
            </div>
        </aside>

    </div>

    <script>
        const Registry = {
            categories: {
                'standard': '🧱 Blöcke',
                'plates': '🫓 Platten',
                'special': '🚀 Extras',
                'space': '🌌 Orbit',
                'castle': '🏰 Burg',
                'nature': '🌳 Natur',
                'vehicles': '🏎 Auto'
            },
            bricks: {
                'b11': { name: 'Würfel 1x1', size: [1, 1, 1], category: 'standard', shape: 'box' },
                'b12': { name: 'Stein 1x2', size: [1, 2, 1], category: 'standard', shape: 'box' },
                'b22': { name: 'Stein 2x2', size: [2, 2, 1], category: 'standard', shape: 'box' },
                'b24': { name: 'Stein 2x4', size: [2, 4, 1], category: 'standard', shape: 'box' },
                'p12': { name: 'Platte 1x2', size: [1, 2, 0.33], category: 'plates', shape: 'box' },
                'p22': { name: 'Platte 2x2', size: [2, 2, 0.33], category: 'plates', shape: 'box' },
                'p44': { name: 'Platte 4x4', size: [4, 4, 0.33], category: 'plates', shape: 'box' },
                's_slope1': { name: 'Dachschräge 1x1', size: [1, 1, 1], category: 'special', shape: 'slope' },
                's_slope2': { name: 'Dachschräge 1x2', size: [1, 2, 1], category: 'special', shape: 'slope' },
                's_cyl1': { name: 'Säule 1x1', size: [1, 1, 1], category: 'special', shape: 'cylinder' },
                's_cyl2': { name: 'Turm 2x2', size: [2, 2, 1], category: 'special', shape: 'cylinder' },
                's_cone': { name: 'Kegel-Spitze', size: [1, 1, 1], category: 'special', shape: 'cone' },
                's_arch': { name: 'Tor-Bogen', size: [1, 3, 2], category: 'special', shape: 'arch' },
                's_wheel': { name: 'Laufrad', size: [1, 1, 1], category: 'special', shape: 'wheel' },
                
                // Preload-Staging für Extensions
                'sp_thruster': { name: 'Triebwerk', size: [1, 1, 1.5], category: 'space', shape: 'cone' },
                'sp_wing_l': { name: 'Flügel Links', size: [2, 3, 1], category: 'space', shape: 'slope' },
                'sp_wing_r': { name: 'Flügel Rechts', size: [2, 3, 1], category: 'space', shape: 'slope' },
                'sp_antenna': { name: 'Antenne', size: [1, 1, 2], category: 'space', shape: 'cylinder' },
                'sp_cockpit': { name: 'Cockpit-Kuppel', size: [2, 2, 1.2], category: 'space', shape: 'sphere' },
                'ca_crenel': { name: 'Burg-Zinne', size: [1, 2, 1], category: 'castle', shape: 'crenel' },
                'ca_tower_round': { name: 'Rundturm', size: [2, 2, 3], category: 'castle', shape: 'cylinder' },
                'ca_stairs': { name: 'Stufen-Treppe', size: [2, 2, 1], category: 'castle', shape: 'stairs' },
                'na_leaf_small': { name: 'Blattwerk', size: [1, 1, 0.4], category: 'nature', shape: 'leaf' },
                'na_trunk': { name: 'Baumstamm', size: [1, 1, 1.5], category: 'nature', shape: 'cylinder' },
                'na_flower': { name: 'Blütenkopf', size: [1, 1, 0.3], category: 'nature', shape: 'flower' },
                'na_crystal': { name: 'Kristall', size: [1, 1, 1.2], category: 'nature', shape: 'crystal' },
                've_wheel_big': { name: 'Breit-Reifen', size: [1.5, 1, 1.5], category: 'vehicles', shape: 'wheel' },
                's_fence_wood': { name: 'Zaun-Element', size: [0.2, 2, 1], category: 'special', shape: 'fence' },
                's_pipe_hollow': { name: 'Tunnel-Rohr', size: [1.5, 1.5, 1.5], category: 'special', shape: 'pipe' }
            },
            colors: [
                { id: 'red', name: 'Rot', hex: '#ef4444' },
                { id: 'blue', name: 'Blau', hex: '#3b82f6' },
                { id: 'yellow', name: 'Gelb', hex: '#eab308' },
                { id: 'green', name: 'Grün', hex: '#22c55e' },
                { id: 'pink', name: 'Pink', hex: '#ec4899' },
                { id: 'orange', name: 'Orange', hex: '#f97316' },
                { id: 'purple', name: 'Lila', hex: '#a855f7' },
                { id: 'white', name: 'Weiß', hex: '#f1f5f9' },
                { id: 'gold', name: 'Gold', hex: '#fbbf24', metalness: 0.7, roughness: 0.2 },
                { id: 'pastel_mint', name: 'Mint', hex: '#a7f3d0' },
                { id: 'trans_ruby', name: 'Glas-Rot', hex: '#f43f5e', transparent: true, opacity: 0.5 },
                { id: 'dark_iron', name: 'Eisen', hex: '#475569', metalness: 0.8, roughness: 0.4 }
            ]
        };

        const GeometryFactory = {
            create(brickId) {
                const config = Registry.bricks[brickId];
                const w = config.size[0] * App.spatialUnit;
                const l = config.size[1] * App.spatialUnit;
                const h = config.size[2] * App.spatialHeight;
                const group = new THREE.Group();
                let baseGeo;

                switch(config.shape) {
                    case 'slope':
                        const shape = new THREE.Shape();
                        shape.moveTo(0, 0); shape.lineTo(w, 0); shape.lineTo(w, h * 0.2); shape.lineTo(0, h); shape.lineTo(0, 0);
                        baseGeo = new THREE.ExtrudeGeometry(shape, { depth: l, bevelEnabled: false });
                        baseGeo.rotateY(Math.PI/2); baseGeo.translate(0, 0, l);
                        break;
                    case 'cylinder':
                        baseGeo = new THREE.CylinderGeometry(w/2 - 0.02, w/2 - 0.02, h, 24);
                        baseGeo.translate(0, h/2, 0);
                        break;
                    case 'cone':
                        baseGeo = new THREE.ConeGeometry(w/2, h, 24);
                        baseGeo.translate(0, h/2, 0);
                        break;
                    case 'arch':
                        const archShape = new THREE.Shape();
                        archShape.moveTo(-w/2, 0); archShape.lineTo(w/2, 0); archShape.lineTo(w/2, h); archShape.lineTo(-w/2, h);
                        const hole = new THREE.Path(); hole.absarc(0, 0, w/3, 0, Math.PI, false);
                        archShape.holes.push(hole);
                        baseGeo = new THREE.ExtrudeGeometry(archShape, { depth: l, bevelEnabled: false });
                        baseGeo.translate(0, 0, l/2);
                        break;
                    case 'wheel':
                        baseGeo = new THREE.CylinderGeometry(w/2, w/2, l*0.8, 24);
                        baseGeo.rotateX(Math.PI/2); baseGeo.translate(0, h/2, 0);
                        break;
                    case 'crenel':
                        const cGroup = new THREE.Group();
                        const bBox = new THREE.BoxGeometry(w, h * 0.5, l); bBox.translate(0, (h * 0.5) / 2, 0);
                        cGroup.add(new THREE.Mesh(bBox));
                        const p1 = new THREE.BoxGeometry(w, h * 0.5, l * 0.3); p1.translate(0, h * 0.75, -l/2 + (l * 0.15));
                        cGroup.add(new THREE.Mesh(p1));
                        return cGroup;
                    case 'stairs':
                        const steps = 4;
                        for(let i = 0; i < steps; i++) {
                            const sGeo = new THREE.BoxGeometry(w, h * ((i + 1) / steps), l / steps);
                            sGeo.translate(0, (h * ((i + 1) / steps)) / 2, -l/2 + (l / steps * i) + (l / steps)/2);
                            group.add(new THREE.Mesh(sGeo));
                        }
                        return group;
                    case 'leaf':
                        const lShape = new THREE.Shape(); lShape.moveTo(0, 0); lShape.quadraticCurveTo(w/2, l/2, 0, l); lShape.quadraticCurveTo(-w/2, l/2, 0, 0);
                        baseGeo = new THREE.ExtrudeGeometry(lShape, { depth: h, bevelEnabled: false }); baseGeo.rotateX(-Math.PI/2);
                        break;
                    case 'flower':
                        baseGeo = new THREE.CylinderGeometry(w/4, w/4, h, 16); baseGeo.translate(0, h/2, 0);
                        break;
                    case 'crystal':
                        baseGeo = new THREE.ConeGeometry(w/2, h, 6); baseGeo.translate(0, h/2, 0);
                        break;
                    case 'sphere':
                        baseGeo = new THREE.SphereGeometry(w/2, 24, 24); baseGeo.translate(0, h/2, 0);
                        break;
                    case 'box':
                    default:
                        baseGeo = new THREE.BoxGeometry(w - 0.03, h, l - 0.03);
                        baseGeo.translate(0, h/2, 0);
                        break;
                }

                group.add(new THREE.Mesh(baseGeo));

                if (config.shape === 'box' || config.shape === 'plates') {
                    const studR = 0.16, studH = 0.08;
                    const studGeo = new THREE.CylinderGeometry(studR, studR, studH, 12);
                    studGeo.translate(0, studH/2, 0);
                    const startX = -w / 2 + App.spatialUnit / 2;
                    const startZ = -l / 2 + App.spatialUnit / 2;

                    for (let x = 0; x < config.size[0]; x++) {
                        for (let z = 0; z < config.size[1]; z++) {
                            const stud = new THREE.Mesh(studGeo);
                            stud.position.set(startX + x * App.spatialUnit, h, startZ + z * App.spatialUnit);
                            group.add(stud);
                        }
                    }
                }
                return group;
            }
        };

        const Engine3D = {
            scene: null, camera: null, renderer: null, controls: null, plane: null,
            raycaster: new THREE.Raycaster(), mouse: new THREE.Vector2(),
            previewMesh: null, currentRotationY: 0, 
            interactObjects: [],
            pointerStart: new THREE.Vector2(),

            init() {
                const container = document.getElementById('canvas-container');
                this.scene = new THREE.Scene();
                this.scene.background = new THREE.Color(0xf8fafc);

                this.camera = new THREE.PerspectiveCamera(45, container.clientWidth / container.clientHeight, 0.1, 1000);
                this.setView('iso');

                this.renderer = new THREE.WebGLRenderer({ antialias: true });
                this.renderer.setSize(container.clientWidth, container.clientHeight);
                this.renderer.shadowMap.enabled = true;
                container.appendChild(this.renderer.domElement);

                this.controls = new THREE.OrbitControls(this.camera, this.renderer.domElement);
                this.controls.enableDamping = true;
                this.controls.maxPolarAngle = Math.PI / 2 - 0.05;

                this.scene.add(new THREE.AmbientLight(0xffffff, 0.6));
                const sun = new THREE.DirectionalLight(0xffffff, 0.6);
                sun.position.set(15, 30, 15); sun.castShadow = true;
                this.scene.add(sun);

                const grid = new THREE.GridHelper(App.playgroundSize, App.playgroundSize, 0x6366f1, 0xcbd5e1);
                grid.position.y = 0.005; this.scene.add(grid);

                const planeGeo = new THREE.PlaneGeometry(App.playgroundSize, App.playgroundSize);
                planeGeo.rotateX(-Math.PI / 2);
                this.plane = new THREE.Mesh(planeGeo, new THREE.MeshBasicMaterial({ visible: false }));
                this.scene.add(this.plane); this.interactObjects.push(this.plane);

                this.refreshPreview();

                container.addEventListener('mousemove', (e) => this.onMouseMove(e));
                
                container.addEventListener('pointerdown', (e) => {
                    this.pointerStart.set(e.clientX, e.clientY);
                });

                container.addEventListener('pointerup', (e) => {
                    if (e.button !== 0) return;
                    const dragDistance = Math.hypot(e.clientX - this.pointerStart.x, e.clientY - this.pointerStart.y);
                    if (dragDistance < 5) {
                        this.onPointerClick(e);
                    }
                });

                window.addEventListener('keydown', (e) => { if (e.key.toLowerCase() === 'r') this.rotatePreview(); });
                window.addEventListener('resize', () => {
                    this.camera.aspect = container.clientWidth / container.clientHeight;
                    this.camera.updateProjectionMatrix();
                    this.renderer.setSize(container.clientWidth, container.clientHeight);
                });

                this.loop();
            },

            setView(mode) {
                if(mode === 'iso') this.camera.position.set(12, 12, 12);
                else this.camera.position.set(0.01, 20, 0);
                if(this.controls) this.controls.target.set(0,0,0);
            },

            getMaterial(colorId, isPreview = false) {
                const data = Registry.colors.find(c => c.id === colorId);
                return new THREE.MeshStandardMaterial({
                    color: new THREE.Color(data.hex),
                    roughness: data.roughness || 0.3,
                    metalness: data.metalness || 0.0,
                    transparent: isPreview, opacity: isPreview ? 0.5 : 1.0
                });
            },

            refreshPreview() {
                if(this.previewMesh) this.scene.remove(this.previewMesh);
                this.previewMesh = new THREE.Group();
                const geo = GeometryFactory.create(App.selectedBrick);
                const mat = this.getMaterial(App.selectedColor, true);
                geo.children.forEach(c => { const clone = c.clone(); clone.material = mat; this.previewMesh.add(clone); });
                this.previewMesh.visible = (App.activeTool === 'place');
                this.scene.add(this.previewMesh);
            },

            rotatePreview() {
                this.currentRotationY = (this.currentRotationY + Math.PI / 2) % (Math.PI * 2);
                if(this.previewMesh) this.previewMesh.rotation.y = this.currentRotationY;
            },

            onMouseMove(e) {
                const rect = this.renderer.domElement.getBoundingClientRect();
                this.mouse.x = ((e.clientX - rect.left) / this.renderer.domElement.clientWidth) * 2 - 1;
                this.mouse.y = -((e.clientY - rect.top) / this.renderer.domElement.clientHeight) * 2 + 1;
                this.raycaster.setFromCamera(this.mouse, this.camera);
                const hits = this.raycaster.intersectObjects(this.interactObjects, true);

                if (hits.length > 0 && App.activeTool === 'place') {
                    const hit = hits[0]; const pos = new THREE.Vector3(); const conf = Registry.bricks[App.selectedBrick];
                    let w = conf.size[0] * App.spatialUnit; let l = conf.size[1] * App.spatialUnit;

                    const isRotated = (Math.abs(Math.sin(this.currentRotationY)) > 0.5);
                    let sizeX = isRotated ? conf.size[1] : conf.size[0];
                    let sizeZ = isRotated ? conf.size[0] : conf.size[1];

                    let targetPoint = hit.point.clone();
                    if (hit.object !== this.plane) {
                        const normal = hit.face.normal.clone().transformDirection(hit.object.matrixWorld);
                        targetPoint.add(normal.multiplyScalar(0.1));
                    }

                    if (sizeX % 2 === 0) pos.x = Math.round(targetPoint.x);

                    pos: [vector3.x, vector3.y, vector3.z], 
                    rot: rotation

                this.placedBricks.push(brick); 
                Engine3D.spawn(brick); 
                SoundFX.play('click'); 
                this.save();
            },
            
            destroyBrick(uuid) {
                const idx = this.placedBricks.findIndex(b => b.uuid === uuid);
                if (idx !== -1) { 
                    const b = this.placedBricks[idx];
                    const colorObj = Registry.colors.find(c => c.id === b.color);
                    const hex = colorObj ? colorObj.hex : '#ffffff';
                    
                    if (window.ParticleEngine) {
                        ParticleEngine.spawnExplosion(new THREE.Vector3(b.pos[0], b.pos[1], b.pos[2]), hex);
                    }
                    
                    Engine3D.remove(uuid); 
                    this.placedBricks.splice(idx, 1); 
                    SoundFX.play('boom'); 
                    this.save(); 
                }
            },
            
            paintBrick(uuid) {
                const b = this.placedBricks.find(brick => brick.uuid === uuid);
                if (b) { 
                    b.color = this.selectedColor; 
                    Engine3D.remove(uuid); 
                    Engine3D.spawn(b); 
                    SoundFX.play('click'); 
                    this.save(); 
                }
            },
            
            exportJSON() {
                if (this.placedBricks.length === 0) return alert("Das Baufeld ist leer!");
                const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(this.placedBricks, null, 2));
                const downloadAnchor = document.createElement('a');
                downloadAnchor.setAttribute("href", dataStr);
                downloadAnchor.setAttribute("download", "brickcraft_modell.json");
                document.body.appendChild(downloadAnchor);
                downloadAnchor.click();
                downloadAnchor.remove();
                SoundFX.play('click');
            },

            importJSON(event) {
                const file = event.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (e) => {
                    try {
                        const parsed = JSON.parse(e.target.result);
                        if (Array.isArray(parsed)) {
                            this.placedBricks.forEach(b => Engine3D.remove(b.uuid));
                            this.placedBricks = parsed;
                            this.placedBricks.forEach(b => Engine3D.spawn(b));
                            this.save();
                            SoundFX.play('click');
                        }
                    } catch(err) {
                        alert("Fehlerhafte Modelldatei.");
                    }
                };
                reader.readAsText(file);
                event.target.value = '';
            },

            save() {
                if (this.historyIdx < this.history.length - 1) {
                    this.history = this.history.slice(0, this.historyIdx + 1);
                }
                this.history.push(JSON.stringify(this.placedBricks)); 
                this.historyIdx++;
            },
            
            undo() { 
                if (this.historyIdx > 0) { 
                    this.historyIdx--; 
                    this.loadHistory(); 
                } 
            },
            
            redo() { 
                if (this.historyIdx < this.history.length - 1) { 
                    this.historyIdx++; 
                    this.loadHistory(); 
                } 
            },
            
            loadHistory() { 
                this.placedBricks.forEach(b => Engine3D.remove(b.uuid)); 
                this.placedBricks = JSON.parse(this.history[this.historyIdx]); 
                this.placedBricks.forEach(b => Engine3D.spawn(b)); 
            },
            
            clearScene() { 
                if (confirm("Möchtest du das Baufeld komplett leeren?")) { 
                    this.placedBricks.forEach(b => Engine3D.remove(b.uuid)); 
                    this.placedBricks = []; 
                    this.save(); 
                } 
            }
        };

        window.addEventListener('DOMContentLoaded', () => App.init());

        's_grill_tile': { name: 'Gitter-Fliese 1x2', size: [1, 2, 0.33], category: 'special', shape: 'grill' },
        's_lego_lever': { name: 'Schalthäbel / Antenne', size: [1, 1, 1.5], category: 'special', shape: 'lever' },
        's_steering_wheel': { name: 'Lenkrad-Konsole', size: [1, 1, 0.8], category: 'special', shape: 'steering_wheel' },
        's_headlight_brick': { name: 'Erni-Winkelstein 1x1', size: [1, 1, 1], category: 'special', shape: 'headlight' },
        's_technic_brick': { name: 'Technic Lochstein 1x2', size: [1, 2, 1], category: 'special', shape: 'technic_hole' },
        's_windshield_curved': { name: 'Cockpit-Glasscheibe', size: [2, 3, 1.3], category: 'special', shape: 'windshield' },
        's_flat_round_2x2': { name: 'Runde Gleitfliese 2x2', size: [2, 2, 0.33], category: 'special', shape: 'round_flat' },
        's_fence_classic': { name: 'Absperr-Gitter 1x4', size: [1, 4, 1], category: 'special', shape: 'classic_fence' }
    };
    Object.assign(Registry.bricks, classicLegoSpecials);

    // 2. ERWEITERTE GEOMETRIE-FABRIK FÜR ECHTE LEGO-SHAPES
    const previousCoreFactory = GeometryFactory.create;
    GeometryFactory.create = function(brickId) {
        const config = Registry.bricks[brickId];
        if (!config || !['grill', 'lever', 'steering_wheel', 'headlight', 'technic_hole', 'windshield', 'round_flat', 'classic_fence'].includes(config.shape)) {
            return previousCoreFactory(brickId);
        }

        const w = config.size[0] * App.spatialUnit;
        const l = config.size[1] * App.spatialUnit;
        const h = config.size[2] * App.spatialHeight;
        const group = new THREE.Group();
        let geo;

        // Prozeduraler Nachbau echter Spritzguss-Teile
        switch(config.shape) {
            case 'grill': // Riffel-Fliese 1x2
                const basePlate = new THREE.Mesh(new THREE.BoxGeometry(w - 0.03, h, l - 0.03)); basePlate.position.y = h/2; group.add(basePlate);
                for(let i = -0.35; i <= 0.35; i += 0.18) {
                    const ridge = new THREE.Mesh(new THREE.BoxGeometry(w * 0.8, 0.04, 0.06));
                    ridge.position.set(0, h, i * l); group.add(ridge);
                }
                break;

            case 'lever': // Steuerhebel
                const baseBlock = new THREE.Mesh(new THREE.BoxGeometry(w*0.8, h*0.3, l*0.8)); baseBlock.position.y = (h*0.3)/2; group.add(baseBlock);
                const stick = new THREE.Mesh(new THREE.CylinderGeometry(0.03, 0.03, h, 8)); stick.position.set(0, h/2, 0); stick.rotation.z = 0.3; group.add(stick);
                const knob = new THREE.Mesh(new THREE.SphereGeometry(0.1, 8, 8)); knob.position.set(-0.15, h, 0); group.add(knob);
                break;

            case 'steering_wheel': // Klassisches Cockpit-Lenkrad
                const consoleBase = new THREE.Mesh(new THREE.BoxGeometry(w, h*0.5, l)); consoleBase.position.y = (h*0.5)/2; group.add(consoleBase);
                const wheelShaft = new THREE.Mesh(new THREE.CylinderGeometry(0.04, 0.04, h*0.6, 8)); wheelShaft.position.set(0, h*0.5, l*0.1); wheelShaft.rotation.x = 0.5; group.add(wheelShaft);
                const wheelRing = new THREE.Mesh(new THREE.CylinderGeometry(w*0.3, w*0.3, 0.04, 12)); wheelRing.position.set(0, h*0.75, l*0.25); wheelRing.rotation.x = 0.5; group.add(wheelRing);
                break;

            case 'headlight': // Winkelstein mit Front-Noppe (SNOT)
                const mainBox = new THREE.Mesh(new THREE.BoxGeometry(w - 0.03, h, l - 0.03)); mainBox.position.y = h/2; group.add(mainBox);
                const frontStud = new THREE.Mesh(new THREE.CylinderGeometry(0.16, 0.16, 0.08, 12)); frontStud.rotation.x = Math.PI / 2; frontStud.position.set(0, h/2, l/2); group.add(frontStud);
                break;

            case 'technic_hole': // Stein mit Achs-Loch in der Mitte
                const blockMesh = new THREE.Mesh(new THREE.BoxGeometry(w - 0.03, h, l - 0.03)); blockMesh.position.y = h/2; group.add(blockMesh);
                const holeInner = new THREE.Mesh(new THREE.CylinderGeometry(0.18, 0.18, w*1.1, 12)); holeInner.rotation.z = Math.PI / 2; holeInner.position.set(0, h/2, 0);
                // Dunkler Fake-Inlay-Zylinder simuliert das Loch optisch tiefenwirksam
                holeInner.material = new THREE.MeshBasicMaterial({ color: 0x1e293b }); group.add(holeInner);
                break;

            case 'windshield': // Schräge transparente Cockpitscheibe
                const shape = new THREE.Shape(); shape.moveTo(-w/2, 0); shape.lineTo(w/2, 0); shape.lineTo(w/4, h); shape.lineTo(-w/4, h);
                baseGeo = new THREE.ExtrudeGeometry(shape, { depth: l, bevelEnabled: false }); baseGeo.center(); baseGeo.translate(0, h/2, 0);
                group.add(new THREE.Mesh(baseGeo));
                break;

            case 'round_flat': // Flache Rundfliese
                baseGeo = new THREE.CylinderGeometry(w/2 - 0.02, w/2 - 0.02, h, 24); baseGeo.translate(0, h/2, 0);
                group.add(new THREE.Mesh(baseGeo));
                return group; // Fliesen brauchen keine Noppen oben drauf

            case 'classic_fence': // Klassischer Schutzzaun
                const bRail = new THREE.Mesh(new THREE.BoxGeometry(w*0.3, h*0.1, l)); bRail.position.set(0, h*0.15, 0); group.add(bRail);
                const tRail = new THREE.Mesh(new THREE.BoxGeometry(w*0.3, h*0.1, l)); tRail.position.set(0, h*0.85, 0); group.add(tRail);
                for(let p = -0.4; p <= 0.4; p += 0.26) {
                    const bar = new THREE.Mesh(new THREE.CylinderGeometry(0.03, 0.03, h*0.8, 8)); bar.position.set(0, h/2, p * l); group.add(bar);
                }
                break;
        }

        // Standard-Noppe oben drauf setzen (außer bei Scheiben und Hebeln)
        if (!['windshield', 'lever', 'steering_wheel'].includes(config.shape)) {
            const studGeo = new THREE.CylinderGeometry(0.16, 0.16, 0.08, 12); studGeo.translate(0, 0.04, 0);
            const stud = new THREE.Mesh(studGeo); stud.position.set(0, h, 0); group.add(stud);
        }

        return group;
    };

    // 3. PROZEDURALES GEBIETS- UND TEXTUREN-SYSTEM (WELTEN-GRID)
    const EnvironmentSystem = {
        styles: {
            'default': { planeColor: 0xffffff, gridCenter: 0x6366f1, gridLines: 0xcbd5e1, bg: 0xf8fafc },
            'grass':   { planeColor: 0x4ade80, gridCenter: 0x15803d, gridLines: 0x22c55e, bg: 0xf0fdf4 },
            'water':   { planeColor: 0x38bdf8, gridCenter: 0x0369a1, gridLines: 0x0ea5e9, bg: 0xf0f9ff },
            'street':  { planeColor: 0x475569, gridCenter: 0xfef08a, gridLines: 0x64748b, bg: 0xf8fafc }
        },

        initUI() {
            // Kammer-Schnellwähler im 3D Feld finden & daneben die Texturen platzieren
            const targetDiv = document.querySelector('main > div.absolute.top-4.right-4');
            const envWrapper = document.createElement('div');
            envWrapper.className = "flex bg-white/90 p-1 rounded-xl border border-slate-200 shadow-sm backdrop-blur mr-2";
            envWrapper.innerHTML = `
                <button onclick="EnvironmentSystem.change('default')" class="p-2 hover:bg-slate-100 rounded-lg text-sm cursor-pointer" title="Standard">⚪</button>
                <button onclick="EnvironmentSystem.change('grass')" class="p-2 hover:bg-slate-100 rounded-lg text-sm cursor-pointer" title="Wiese">🌿</button>
                <button onclick="EnvironmentSystem.change('water')" class="p-2 hover:bg-slate-100 rounded-lg text-sm cursor-pointer" title="Wasser">💧</button>
                <button onclick="EnvironmentSystem.change('street')" class="p-2 hover:bg-slate-100 rounded-lg text-sm cursor-pointer" title="Straße">🛣️</button>
            `;
            targetDiv.parentNode.insertBefore(envWrapper, targetDiv);
        },

        change(styleKey) {
            const s = this.styles[styleKey];
            if (!s) return;

            // 1. Spielflächenfarbe anpassen
            Engine3D.plane.material.visible = (styleKey !== 'default');
            if (Engine3D.plane.material.visible) {
                Engine3D.plane.material.dispose();
                Engine3D.plane.material = new THREE.MeshStandardMaterial({ 
                    color: s.planeColor, 
                    roughness: styleKey === 'water' ? 0.1 : 0.6,
                    metalness: styleKey === 'water' ? 0.2 : 0.0
                });
            }

            // 2. Grid-Hilfslinien farblich morphen
            const currentGrid = Engine3D.scene.children.find(c => c.isGridHelper);
            if (currentGrid) {
                Engine3D.scene.remove(currentGrid);
                currentGrid.geometry.dispose();
                currentGrid.material.dispose();
            }
            
            const newGrid = new THREE.GridHelper(App.playgroundSize, App.playgroundSize, s.gridCenter, s.gridLines);
            newGrid.position.y = 0.005;
            Engine3D.scene.add(newGrid);

            // 3. Hintergrund-Atmosphäre updaten
            Engine3D.scene.background.setHex(s.bg);
            SoundFX.play('click');
        }
    };
    window.EnvironmentSystem = EnvironmentSystem;
    EnvironmentSystem.initUI();

    // 4. MINIMALISTISCHES SPEICHERN & LADEN SYSTEM (LOCALSTORAGE SLOTS)
    const SaveLoadSystem = {
        initUI() {
            // Füge Speicherknöpfe direkt in die TopBar neben dem Papierkorb ein
            const toolContainer = document.querySelector('header > div.flex.items-center.space-x-3');
            const divider = document.createElement('div'); divider.className = "h-6 w-[1px] bg-slate-200 mx-1";
            
        },

        saveToBrowser() {
            if (App.placedBricks.length === 0) return;
            localStorage.setItem('brickcraft_kid_save', JSON.stringify(App.placedBricks));
            
            // Minimalistischer Erfolgs-Flash-Effekt auf dem Speicherknopf
            SoundFX.play('click');
            alert("Dein Kunstwerk wurde sicher gemerkt! 🌟");
        },

        loadFromBrowser() {
            const savedData = localStorage.getItem('brickcraft_kid_save');
            if (!savedData) return alert("Du hast noch kein Modell im Speicher! Bau erst etwas Tolles.");

            if (App.placedBricks.length > 0 && !confirm("Möchtest du dein aktuelles Modell durch das geladene ersetzen?")) return;

            // Altes Feld vaporisieren
            App.placedBricks.forEach(b => Engine3D.remove(b.uuid));
            
            // Neues Feld einspeisen
            App.placedBricks = JSON.parse(savedData);
            App.placedBricks.forEach(b => Engine3D.spawn(b));
            
            App.save(); // Undo/Redo Verlauf aktualisieren
            SoundFX.play('click');
        }
    };
    SaveLoadSystem.initUI();

    // UI-Refresh für die neu injizierten Sonderteile erzwingen
    UIManager.renderBricks('special');
    console.log("💚 Extension erfolgreich aktiv geschaltet. Bereit zum Spielen!");
})();

        }

        const w = config.size[0] * App.spatialUnit;
        const l = config.size[1] * App.spatialUnit;
        const h = config.size[2] * App.spatialHeight;
        const group = new THREE.Group();
        let geo;

        // Prozedurale Modellierung der legendären Plastikformen
        switch(config.shape) {
            case 'lego_chair': // Legendärer Schalensitz für Spielfiguren
                const seatBase = new THREE.Mesh(new THREE.BoxGeometry(w, h * 0.4, l)); seatBase.position.y = (h * 0.4)/2; group.add(seatBase);
                const backrest = new THREE.Mesh(new THREE.BoxGeometry(w, h * 1.2, l * 0.2)); backrest.position.set(0, h * 0.4 + (h * 1.2)/2, -l/2 + (l * 0.1)); group.add(backrest);
                const armrestL = new THREE.Mesh(new THREE.BoxGeometry(w * 0.15, h * 0.5, l * 0.6)); armrestL.position.set(-w/2 + (w * 0.075), h * 0.4 + (h * 0.25), l * 0.1); group.add(armrestL);
                const armrestR = new THREE.Mesh(new THREE.BoxGeometry(w * 0.15, h * 0.5, l * 0.6)); armrestR.position.set(w/2 - (w * 0.075), h * 0.4 + (h * 0.25), l * 0.1); group.add(armrestR);
                break;

            case 'mudguard': // Kotflügel für Radläufe
                const topPlate = new THREE.Mesh(new THREE.BoxGeometry(w, h * 0.2, l)); topPlate.position.y = h - (h * 0.2)/2; group.add(topPlate);
                const frontWall = new THREE.Mesh(new THREE.BoxGeometry(w, h * 0.8, l * 0.2)); frontWall.position.set(0, (h * 0.8)/2, -l/2 + (l * 0.1)); group.add(frontWall);
                const backWall = new THREE.Mesh(new THREE.BoxGeometry(w, h * 0.8, l * 0.2)); backWall.position.set(0, (h * 0.8)/2, l/2 - (l * 0.1)); group.add(backWall);

                const lowerSquare = new THREE.Mesh(new THREE.BoxGeometry(w, h * 0.5, l)); lowerSquare.position.y = (h * 0.5)/2; group.add(lowerSquare);
                const upperCircle = new THREE.Mesh(new THREE.CylinderGeometry(w * 0.42, w * 0.42, h * 0.5, 24)); upperCircle.position.y = h * 0.5 + (h * 0.5)/2; group.add(upperCircle);

                geo = new THREE.BoxGeometry(w - 0.03, h, l - 0.03); geo.translate(0, h/2, 0);
                group.add(new THREE.Mesh(geo));

        if (config.shape === 'round_block' || config.shape === 'turntable') {

        switch(config.shape) {

    };

    const previousFactoryLayer = GeometryFactory.create;
    GeometryFactory.create = function(brickId) {
        const config = Registry.bricks[brickId];
        if (!config || !['corner_box', 'profile_box'].includes(config.shape)) {
            return previousFactoryLayer(brickId); // Nutzt automatischen Box-Generator für b13, b14, b16 etc.
        }

        const w = config.size[0] * App.spatialUnit;
        const l = config.size[1] * App.spatialUnit;
        const h = config.size[2] * App.spatialHeight;
        const group = new THREE.Group();
        let geo;

        switch(config.shape) {
            case 'corner_box': // Legendärer L-förmiger Eckbaustein
                const cornerShape = new THREE.Shape();
                // Zeichnet ein perfektes L-Profil im 2x2 Raster
                cornerShape.moveTo(-w/2, -l/2);
                cornerShape.lineTo(w/2, -l/2);
                cornerShape.lineTo(w/2, l/2);
                cornerShape.lineTo(0, l/2);
                cornerShape.lineTo(0, 0);
                cornerShape.lineTo(-w/2, 0);
                cornerShape.lineTo(-w/2, -l/2);

                geo = new THREE.ExtrudeGeometry(cornerShape, { depth: h, bevelEnabled: false });
                geo.rotateX(-Math.PI / 2); // Aufrecht hinstellen
                geo.translate(0, h, 0); // Bodenbündig ausrichten
                group.add(new THREE.Mesh(geo));

                // Manuelle Noppen-Verteilung auf den 3 Segmenten des L-Steins
                const studG = new THREE.CylinderGeometry(0.16, 0.16, 0.08, 12); studG.translate(0, 0.04, 0);
                const u = App.spatialUnit;
                
                const s1 = new THREE.Mesh(studG); s1.position.set(-u/2, h, -u/2); group.add(s1);
                const s2 = new THREE.Mesh(studG); s2.position.set(u/2, h, -u/2); group.add(s2);
                const s3 = new THREE.Mesh(studG); s3.position.set(u/2, h, u/2); group.add(s3);
                return group;

            case 'profile_box': // 1x2 Stein mit horizontalen Einkerbungen (Mauer-Optik)
                const baseBox = new THREE.Mesh(new THREE.BoxGeometry(w - 0.03, h, l - 0.03));
                baseBox.position.y = h/2; group.add(baseBox);

                // Dekorative Mauer-Fugen auf den Längsseiten einlassen
                const grooveGeo = new THREE.BoxGeometry(w * 1.01, h * 0.06, 0.03);
                const g1 = new THREE.Mesh(grooveGeo); g1.position.set(0, h * 0.33, l/2); group.add(g1);
                const g2 = new THREE.Mesh(grooveGeo); g2.position.set(0, h * 0.66, l/2); group.add(g2);
                const g3 = new THREE.Mesh(grooveGeo); g3.position.set(0, h * 0.33, -l/2); group.add(g3);
                const g4 = new THREE.Mesh(grooveGeo); g4.position.set(0, h * 0.66, -l/2); group.add(g4);
                
                // Standard 1x2 Noppen oben drauf setzen
                const studGeom = new THREE.CylinderGeometry(0.16, 0.16, 0.08, 12); studGeom.translate(0, 0.04, 0);
                for(let z = -0.25; z <= 0.25; z += 0.5) {

})();

(function() {
    console.log("🌟 Refinement of Neon Glow-Bricks activated...");

    // 1. NEON-FARBEN MIT GLOW-EIGENSCHAFT IN DIE REGISTRY INJIZIEREN (UNVERÄNDERT)
    const neonColors = [
        { id: 'neon_green', name: 'Zappy Neon-Grün 🔋', hex: '#22c55e', glow: true },
        { id: 'neon_orange', name: 'Glühende Lava 🌋', hex: '#f97316', glow: true },
        { id: 'neon_cyan', name: 'Cyber-Laserblau ⚡', hex: '#06b6d4', glow: true },
        { id: 'neon_purple', name: 'Magisches Plasma 🔮', hex: '#a855f7', glow: true }
    ];
    Registry.colors.push(...neonColors);

    // 2. KORREKTUR DER MATERIAL-ENGINE (GESÄTTIGTERES GLOWEN, NICHT GRELL)
    const baseGetMaterial = Engine3D.getMaterial;
    Engine3D.getMaterial = function(colorId, isPreview = false) {
        // Hol das Standard-Material aus dem Core
        const material = baseGetMaterial.call(Engine3D, colorId, isPreview);
        const colorData = Registry.colors.find(c => c.id === colorId);
        
        // Wenn es eine Leuchtfarbe ist, aktivieren wir das hocheffiziente Eigenleuchten
        if (colorData && colorData.glow) {
            // Wir verwenden die gesättigte Farbe für emissive, damit sie gesättigt bleibt.
            material.emissive = new THREE.Color(colorData.hex);
            // Die Vorschau leuchtet leicht, der fertig gebaute Stein strahlt, aber gesättigt.
            // Reduziert von 1.8 auf 1.0, um "grell" zu vermeiden.
            material.emissiveIntensity = isPreview ? 0.3 : 1.0; 
            // Option: Die Grundfarbe dämpfen, damit der Leuchteffekt gesättigter wirkt.
            // material.color.setHex(0xaaaaaa); // Dämpft die Grundfarbe leicht.
        }
        return material;
    };

    // 3. LICHT-PIPELINE OPTIMIEREN (ECHTES LICHT, ABER SANFTER)
    const baseSpawn = Engine3D.spawn;
    Engine3D.spawn = function(brick) {
        // Erst den Stein ganz normal über das Core-System bauen
        baseSpawn.call(Engine3D, brick);
        
        // Prüfen, ob der frisch gebaute Stein eine Neonfarbe hat
        const colorData = Registry.colors.find(c => c.id === brick.color);
        if (colorData && colorData.glow) {
            // Finde das gerade erzeugte 3D-Objekt in der Szene
            const group = Engine3D.scene.getObjectByProperty('uuid', brick.uuid);
            if (group) {
                // Wir setzen ein Punktlicht direkt in das Herz des Steins
                // Reichweite von 3.5 Einheiten sorgt für perfekte Beleuchtung der Nachbarn ohne Performance-Verlust
                // Intensität leicht angepasst auf 1.0 für bessere Balance.
                const softGlowLight = new THREE.PointLight(colorData.hex, 1.0, 3.5);
                softGlowLight.position.set(0, App.spatialHeight / 2, 0);
                softGlowLight.castShadow = false; // Schont den Prozessor bei vielen Lichtern
                softGlowLight.name = "neon_light_source";
                
                group.add(softGlowLight);
            }
        }
    };

    // 4. UI FARB-RASTER KORRIGIEREN (ENTFERNEN DES PULSIERENS, SAUBERERER GLOW-EFFEKT)
    const baseRenderColors = UIManager.renderColors;
    UIManager.renderColors = function() {
        // Lass das UI-System die Kreise wie gewohnt zeichnen
        baseRenderColors.call(UIManager);
        
        // Verpasse allen Neon-Knöpfen per JavaScript ein leuchtendes CSS-Gewand
        Registry.colors.forEach(c => {
            if (c.glow) {
                const btn = document.querySelector(`button[title="${c.name}"]`);
                if (btn) {
                    // Entferne das störende Pulsieren komplett!
                    btn.classList.remove('animate-pulse');
                    // Behalte den box-shadow, aber dämpfe ihn leicht ab für ein saubereres Design.
                    // Reduziert von 20px auf 12px und weniger opak.
                    btn.style.boxShadow = `0 0 12px ${c.hex}99`;
                    // Entferne den weißen Innenring für maximale Sauberkeit.
                    btn.style.border = "none";
                }
            }
        });
    };

    // 5. SOFORTIGEN NEUAUFBAU DER PALETTE STARTEN
    UIManager.renderColors();
    console.log("💚 Neon-Glow-Modul Refinement successfully applied. Clean glow is active!");
})();

        const l = config.size[1] * App.spatialUnit;
        const h = config.size[2] * App.spatialHeight;
        const group = new THREE.Group();
        let geo;

        // Einzelne Noppen-Schablone für die Wiederverwendung
        const studGeo = new THREE.CylinderGeometry(0.16, 0.16, 0.08, 12); 
        studGeo.translate(0, 0.04, 0);

        switch(config.shape) {
            case 'plate_round_1x1': // Runde 1x1 Platte (Knopf)

                const c1 = new THREE.Mesh(studGeo); c1.position.set(-u/2, h, -u/2); group.add(c1);

                for (let i = 0; i < 3; i++) {
                    const factor = 1 - (i * 0.25);
                    const tier = new THREE.Mesh(new THREE.ConeGeometry((w / 2) * factor, h * 0.4, 8));
                    tier.position.y = (h * 0.2) + (i * h * 0.3);
                    group.add(tier);
                }
                break;

            case 'lego_bush': // Runder Pflanzenschopf aus ineinander verschachtelten Kugelkörpern
                const centerSphere = new THREE.Mesh(new THREE.SphereGeometry(w * 0.4, 12, 12)); centerSphere.position.y = h/2; group.add(centerSphere);
                // Seitliche Blattschöpfe dekorieren
                for(let r = 0; r < 4; r++) {
                    const leafCluster = new THREE.Mesh(new THREE.SphereGeometry(w * 0.28, 8, 8));
                    leafCluster.position.set(Math.cos(r * Math.PI/2) * w * 0.3, h * 0.6, Math.sin(r * Math.PI/2) * l * 0.3);
                    group.add(leafCluster);
                }
                break;

            case 'grass_3prong': // Drei dünne Halme, die elegant nach außen gebogen wegstehen
                const baseDisc = new THREE.Mesh(new THREE.CylinderGeometry(w*0.2, w*0.2, h*0.15, 8)); baseDisc.position.y = (h*0.15)/2; group.add(baseDisc);
                for(let i = 0; i < 3; i++) {
                    const blade = new THREE.Mesh(new THREE.ConeGeometry(0.04, h * 0.9, 6));
                    blade.position.set(0, h * 0.45, 0);
                    blade.rotation.z = 0.25; // Neigung nach außen
                    blade.rotation.y = (i * Math.PI * 2) / 3; // Drittel-Teilung im Kreis
                    group.add(blade);
                }
                return group; // Grashalme sind oben spitz, keine Noppen möglich

            case 'rock_boulder': // Ein asymmetrischer, kantiger Felsbrocken (Dodekaeder-Geometrie für Lego-Look)
                geo = new THREE.DodecahedronGeometry(w * 0.58, 0);
                geo.scale(1.0, 1.1, 1.0); // Leicht in die Höhe strecken
                geo.translate(0, h/2, 0);
                group.add(new THREE.Mesh(geo));
                break;

            case 'bamboo_stem': // Segmentierter Bambusstab mit Verdickungen
                const segments = 3;
                for(let i = 0; i < segments; i++) {
                    const segH = h / segments;
                    const segment = new THREE.Mesh(new THREE.CylinderGeometry(w*0.18, w*0.18, segH - 0.04, 10));
                    segment.position.y = (segH * i) + (segH / 2);
                    group.add(segment);
                    // Segment-Knotenpunkt (Ring)
                    const joint = new THREE.Mesh(new THREE.CylinderGeometry(w*0.22, w*0.22, 0.04, 10));
                    joint.position.y = (segH * i) + segH - 0.02;
                    group.add(joint);
                }
                break;

            case 'hanging_vine': // Gewundene, organische Kletterpflanze
                const chainElements = 4;
                for(let i = 0; i < chainElements; i++) {
                    const elemH = h / chainElements;
                    const link = new THREE.Mesh(new THREE.CylinderGeometry(0.05, 0.05, elemH, 8));
                    link.position.set(Math.sin(i * 1.5) * 0.1, (elemH * i) + elemH/2, 0);
                    link.rotation.z = Math.cos(i * 1.5) * 0.15;
                    group.add(link);
                }
                break;
        }

        // Standard-Noppe oben drauf setzen (falls anbaubar)
        if (!['hanging_vine', 'pine_leaf'].includes(config.shape)) {
            const topStud = new THREE.Mesh(studGeo); topStud.position.set(0, h, 0); group.add(topStud);
        }

        return group;
    };

    // 3. EINE URWALD-OASEN-VORLAGE ALS PRESET HINZUFÜGEN (BLUEPRINTS)
    if (window.BlueprintManager) {
        BlueprintManager.blueprints['nature_oasis'] = {
            name: '🌳 Kleine Palmen-Oase',
            blocks: [
                { type: 'na_rock_boulder', color: 'dark_iron', pos: [-1, 0, -1], rot: 0 },
                { type: 'na_grass_3prong', color: 'green', pos: [1, 0, 1], rot: 0 },
                // Eine kleine Palme aus den stapelbaren Stamm-Elementen bauen
                { type: 'na_palm_trunk', color: 'orange', pos: [0, 0, 0], rot: 0 },
                { type: 'na_palm_trunk', color: 'orange', pos: [0, 1.2, 0], rot: 0.4 },
                { type: 'na_palm_trunk', color: 'orange', pos: [0.1, 2.4, 0], rot: 0.8 },
                // Palmenkrone aufsetzen (Tannenzweig zweckentfremdet/umgefärbt)
                { type: 'na_pine_leaf_4x4', color: 'green', pos: [0.2, 3.6, 0], rot: 0 }
            ]
        };
        BlueprintManager.init();
    }

    // Refresh der Kacheln erzwingen, wenn der User im Natur-Reiter steht
    if (window.UIManager) {
        UIManager.renderBricks('nature');
    }

    console.log("💚 Das Mega Natur-Erweiterungspack wurde erfolgreich verwurzelt!");
})();

// BRICKCRAFT STUDIO - ADVANCED TREE SPECIES EXTENSION (SOTA 2026)

(function() {
    console.log("🌳 Pflanze neue Baumarten im BrickCraft-Wald...");

    // 1. NEUE BAUMARTEN IN DIE REGISTRY EINTRAGEN
    const newTreeSpecies = {
        'na_tree_classic': { name: 'Klassischer Laubbaum', size: [2, 2, 3], category: 'nature', shape: 'tree_classic' },
        'na_tree_apple': { name: 'Apfelbaum mit Früchten', size: [2, 2, 3], category: 'nature', shape: 'tree_apple' },
        'na_tree_birch': { name: 'Birke (Weißer Stamm)', size: [1, 1, 3.5], category: 'nature', shape: 'tree_birch' },
        'na_tree_sakura': { name: 'Kirschblütenbaum (Rosa)', size: [2, 2, 3], category: 'nature', shape: 'tree_sakura' },
        'na_tree_willow': { name: 'Trauerweide hängend', size: [2, 2, 2.5], category: 'nature', shape: 'tree_willow' }
    };
    Object.assign(Registry.bricks, newTreeSpecies);

    // 2. ERWEITERUNG DER 3D-GEOMETRIE-FABRIK FÜR BAUM-SHAPES
    const priorNatureFactoryChain = GeometryFactory.create;
    GeometryFactory.create = function(brickId) {
        const config = Registry.bricks[brickId];
        if (!config || !['tree_classic', 'tree_apple', 'tree_birch', 'tree_sakura', 'tree_willow'].includes(config.shape)) {
            return priorNatureFactoryChain(brickId); // Fallback auf bestehende Geometrien
        }

        const w = config.size[0] * App.spatialUnit;
        const l = config.size[1] * App.spatialUnit;
        const h = config.size[2] * App.spatialHeight;
        const group = new THREE.Group();
        let geo;

        // Hilfsfunktion für Standard-Lego-Noppe
        const addTopStud = (targetGroup, height) => {
            const studG = new THREE.CylinderGeometry(0.16, 0.16, 0.08, 12);
            studG.translate(0, 0.04, 0);
            const stud = new THREE.Mesh(studG);
            stud.position.set(0, height, 0);
            targetGroup.add(stud);
        };

        // Hilfsfunktion für Baumkronen-Kugeln (Lego-Style)
        const createLeavesCluster = (targetGroup, size, yPos, colorHex) => {
            const mat = new THREE.MeshStandardMaterial({ color: colorHex, roughness: 0.6 });
            const cluster = new THREE.Mesh(new THREE.SphereGeometry(size, 10, 10), mat);
            cluster.position.set(0, yPos, 0);
            cluster.castShadow = true; cluster.receiveShadow = true;
            targetGroup.add(cluster);
        };

        switch(config.shape) {
            case 'tree_classic': // Klassischer Laubbaum: Brauner Stamm + 3 grüne, gestapelte Kugelkronen
                const trunkGeo = new THREE.CylinderGeometry(w*0.15, w*0.22, h*0.4, 10); trunkGeo.translate(0, h*0.2, 0);
                const trunk = new THREE.Mesh(trunkGeo, new THREE.MeshStandardMaterial({ color: 0x9a3412, roughness: 0.8 })); // Braun
                group.add(trunk);
                
                // Verschachtelte Blätterkronen (Dunkelgrün bis Hellgrün)
                createLeavesCluster(group, w*0.5, h*0.55, 0x15803d);
                createLeavesCluster(group, w*0.42, h*0.75, 0x16a34a);
                createLeavesCluster(group, w*0.32, h*0.92, 0x22c55e);
                break;

            case 'tree_apple': // Apfelbaum: Wie Classic, aber mit kleinen roten Frucht-Kugeln
                const aTrunkGeo = new THREE.CylinderGeometry(w*0.15, w*0.22, h*0.4, 10); aTrunkGeo.translate(0, h*0.2, 0);
                group.add(new THREE.Mesh(aTrunkGeo, new THREE.MeshStandardMaterial({ color: 0x7c2d12, roughness: 0.8 })));
                
                createLeavesCluster(group, w*0.5, h*0.55, 0x16a34a);
                createLeavesCluster(group, w*0.38, h*0.8, 0x22c55e);
                
                // Rote Äpfel injizieren (kleine Kugeln)
                const appleMat = new THREE.MeshStandardMaterial({ color: 0xef4444, roughness: 0.3 });
                const appleOffsets = [
                    [w*0.35, h*0.5, w*0.2], [-w*0.35, h*0.55, -w*0.2],
                    [w*0.1, h*0.65, w*0.35], [-w*0.2, h*0.7, -w*0.3]
                ];
                appleOffsets.forEach(pos => {
                    const apple = new THREE.Mesh(new THREE.SphereGeometry(0.12, 6, 6), appleMat);
                    apple.position.set(pos[0], pos[1], pos[2]);
                    group.add(apple);
                });
                break;

            case 'tree_birch': // Birke: Schlanker weißer Stamm mit charakteristischen schwarzen Ringfugen
                const bTrunk = new THREE.Mesh(new THREE.CylinderGeometry(w*0.12, w*0.16, h*0.5, 10), new THREE.MeshStandardMaterial({ color: 0xf8fafc, roughness: 0.5 })); // Weiß
                bTrunk.position.y = h*0.25; group.add(bTrunk);
                
                // Schwarze Rinden-Markierungen aufsetzen
                const stripeMat = new THREE.MeshBasicMaterial({ color: 0x0f172a });
                for(let i = 1; i <= 3; i++) {
                    const stripe = new THREE.Mesh(new THREE.CylinderGeometry(w*0.14, w*0.14, 0.05, 10), stripeMat);
                    stripe.position.set(0, h * 0.12 * i, 0); group.add(stripe);
                }
                
                // Lockere, helle Birkenkrone
                createLeavesCluster(group, w*0.45, h*0.6, 0x4ade80);
                createLeavesCluster(group, w*0.35, h*0.82, 0x86efac);
                break;

            case 'tree_sakura': // Japanischer Kirschblütenbaum: Dunkler Stamm + weiche, rosa Blütenwolken
                const sTrunkGeo = new THREE.CylinderGeometry(w*0.14, w*0.25, h*0.35, 10); sTrunkGeo.translate(0, h*0.175, 0);
                group.add(new THREE.Mesh(sTrunkGeo, new THREE.MeshStandardMaterial({ color: 0x431407, roughness: 0.9 }))); // Fast Schwarz
                
                // Blütenwolken in Rosa/Pink gestapelt
                createLeavesCluster(group, w*0.52, h*0.5, 0xec4899);
                createLeavesCluster(group, w*0.44, h*0.72, 0xf472b6);
                createLeavesCluster(group, w*0.32, h*0.9, 0xfbcfe8);
                break;

            case 'tree_willow': // Trauerweide: Knorriger Stamm + breite, flache Hängekrone
                const wTrunkGeo = new THREE.CylinderGeometry(w*0.18, w*0.28, h*0.4, 10); wTrunkGeo.translate(0, h*0.2, 0);
                group.add(new THREE.Mesh(wTrunkGeo, new THREE.MeshStandardMaterial({ color: 0x451a03, roughness: 0.8 })));
                
                // Breite Hauptkrone
                createLeavesCluster(group, w*0.6, h*0.6, 0x047857);
                
                // Herabhängende Blätterzweige (Zylinder) an den Außenseiten simulieren
                const willowLeafMat = new THREE.MeshStandardMaterial({ color: 0x065f46, roughness: 0.6 });
                for(let r = 0; r < 5; r++) {
                    const strand = new THREE.Mesh(new THREE.CylinderGeometry(0.06, 0.04, h * 0.45, 6), willowLeafMat);
                    const angle = (r * Math.PI * 2) / 5;
                    strand.position.set(Math.cos(angle) * w * 0.45, h * 0.45, Math.sin(angle) * l * 0.45);
                    group.add(strand);
                }
                break;
        }

        // Jedes Baum-Asset erhält oben auf der Spitze eine Noppe, um Vögel oder Fahnen anzubauen
        addTopStud(group, h);

        // Allen Kindern der Gruppe Schattenwurf zuweisen (wichtig für die Tiefenwirkung)
        group.children.forEach(child => {
            if(child.isMesh) { child.castShadow = true; child.receiveShadow = true; }
        });

        return group;
    };

    // Refresh der UI-Kacheln im linken Natur-Menü erzwingen
    if (window.UIManager) {
        UIManager.renderBricks('nature');
    }

    console.log("💚 Die neuen Baumarten wurden erfolgreich im Studio eingepflanzt!");
})();

(function() {
    console.log("🌌 Starte Hyperantrieb: Weltraum-Extension wird geladen...");

    // 1. ANPASSUNG DER SHAPES FÜR BESTEHENDE STUBS & NEUE WELTRAUM-ELEMENTE
    const spaceModifications = {
        // Bestehende Stubs auf prozedurale Custom-Shapes umleiten
        'sp_thruster': { name: 'Raketen-Triebwerk', size: [1, 1, 1.5], category: 'space', shape: 'space_thruster' },
        'sp_wing_l': { name: 'Raumschiff-Flügel Links', size: [2, 3, 1], category: 'space', shape: 'space_wing_l' },
        'sp_wing_r': { name: 'Raumschiff-Flügel Rechts', size: [2, 3, 1], category: 'space', shape: 'space_wing_r' },
        'sp_antenna': { name: 'Sensor-Antenne', size: [1, 1, 2], category: 'space', shape: 'space_antenna' },
        'sp_cockpit': { name: 'Cockpit-Kuppel (Glas)', size: [2, 2, 1.2], category: 'space', shape: 'space_cockpit' },
        
        // Brandneue Sci-Fi Tech-Komponenten hinzufügen
        'sp_solar_grid': { name: 'Solar-Panel 2x4', size: [2, 4, 0.33], category: 'space', shape: 'space_solar' },
        'sp_laser_cannon': { name: 'Doppel-Laserkanone', size: [1, 2, 1], category: 'space', shape: 'space_laser' }
    };
    Object.assign(Registry.bricks, spaceModifications);

    // Hilfsfunktion: Generiert eine coole blaue Solarzellen-Struktur ohne externe Bilder
    const createSolarTexture = () => {
        const canvas = document.createElement('canvas');
        canvas.width = 128; canvas.height = 256;
        const ctx = canvas.getContext('2d');
        // Deep Space Blau
        ctx.fillStyle = '#1e3a8a'; ctx.fillRect(0, 0, 128, 256);
        // Solar-Gitterlinien (Gold/Silber-Look)
        ctx.strokeStyle = '#60a5fa'; ctx.lineWidth = 2;
        for(let y = 0; y < 256; y += 32) {
            ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(128, y); ctx.stroke();
        }
        for(let x = 0; x < 128; x += 32) {
            ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, 256); ctx.stroke();
        }
        const tex = new THREE.CanvasTexture(canvas);
        return tex;
    };

    // 2. INJEKTION IN DIE THREE.JS GEOMETRIE-PIPELINE
    const priorSpaceFactory = GeometryFactory.create;
    GeometryFactory.create = function(brickId) {
        const config = Registry.bricks[brickId];
        if (!config || !['space_thruster', 'space_wing_l', 'space_wing_r', 'space_antenna', 'space_cockpit', 'space_solar', 'space_laser'].includes(config.shape)) {
            return priorSpaceFactory(brickId); // Fallback auf Standard-Steine
        }

        const w = config.size[0] * App.spatialUnit;
        const l = config.size[1] * App.spatialUnit;
        const h = config.size[2] * App.spatialHeight;
        const group = new THREE.Group();
        let geo;

        // Noppen-Geometrie für Aufbauten
        const studGeo = new THREE.CylinderGeometry(0.16, 0.16, 0.08, 12); studGeo.translate(0, 0.04, 0);

        switch(config.shape) {
            case 'space_thruster': // Konisches Raketentriebwerk mit geriffeltem Auslass
                geo = new THREE.CylinderGeometry(w*0.25, w*0.45, h*0.75, 16); geo.translate(0, h*0.375, 0);
                const nozzle = new THREE.Mesh(geo); group.add(nozzle);
                // Glühender Plasma-Ring innen (Nutzt emissive Detaillierung)
                const fireRing = new THREE.Mesh(
                    new THREE.CylinderGeometry(w*0.2, w*0.2, 0.05, 12),
                    new THREE.MeshStandardMaterial({ color: 0x38bdf8, emissive: 0x0ea5e9, emissiveIntensity: 1.5 })
                );
                fireRing.position.y = 0.02; group.add(fireRing);
                break;

            case 'space_wing_l': // Aerodynamischer linker Delta-Flügel (Wedge-Profil)
            case 'space_wing_r': // Rechter Delta-Flügel
                const wingShape = new THREE.Shape();
                const isLeft = config.shape === 'space_wing_l';
                if (isLeft) {
                    wingShape.moveTo(-w/2, -l/2); wingShape.lineTo(w/2, -l/2); wingShape.lineTo(-w/2, l/2);
                } else {
                    wingShape.moveTo(w/2, -l/2); wingShape.lineTo(-w/2, -l/2); wingShape.lineTo(w/2, l/2);
                }
                geo = new THREE.ExtrudeGeometry(wingShape, { depth: h * 0.3, bevelEnabled: false });
                geo.rotateX(-Math.PI / 2); geo.center(); geo.translate(0, (h*0.3)/2, 0);
                group.add(new THREE.Mesh(geo));
                // Setze Noppen auf die dicke Flügel-Kante
                const stWing = new THREE.Mesh(studGeo); stWing.position.set(isLeft ? -w/4 : w/4, h*0.3, -l/3); group.add(stWing);
                return group;

            case 'space_antenna': // Schlanke Peilantenne mit Radarschüssel am Fuß
                const dish = new THREE.Mesh(new THREE.CylinderGeometry(w*0.4, w*0.1, h*0.2, 16)); dish.position.y = (h*0.2)/2; group.add(dish);
                const rod = new THREE.Mesh(new THREE.CylinderGeometry(0.03, 0.03, h*0.8, 8)); rod.position.y = h*0.2 + (h*0.8)/2; group.add(rod);
                const tip = new THREE.Mesh(new THREE.SphereGeometry(0.08, 8, 8), new THREE.MeshStandardMaterial({ color: 0xef4444 })); tip.position.y = h; group.add(tip);
                return group;

            case 'space_cockpit': // Durchsichtige Cockpithaube (Classic-Space Style)
                const dome = new THREE.Mesh(
                    new THREE.SphereGeometry(w/2, 16, 14, 0, Math.PI*2, 0, Math.PI/2),
                    new THREE.MeshStandardMaterial({ color: 0x06b6d4, transparent: true, opacity: 0.6, roughness: 0.1 })
                );
                dome.scale.set(1.0, h / (w/2), 1.0); // An Steinhöhe anpassen
                group.add(dome);
                break;

            case 'space_solar': // Flaches Tech-Panel mit prozeduralem High-Tech-Zellen-Gitter
                const panelBase = new THREE.Mesh(
                    new THREE.BoxGeometry(w - 0.03, h, l - 0.03),
                    new THREE.MeshStandardMaterial({ map: createSolarTexture(), roughness: 0.2 })
                );
                panelBase.position.y = h/2; group.add(panelBase);
                return group; // Glatte Solarflächen besitzen keine Noppen

            case 'space_laser': // Sci-Fi Kanonenblock mit zwei transparenten Laser-Läufen
                const body = new THREE.Mesh(new THREE.BoxGeometry(w-0.03, h*0.6, l*0.5)); body.position.set(0, (h*0.6)/2, -l*0.2); group.add(body);
                // 2 Läufe (Cylinder) nebeneinander nach vorne feuernd
                const pipeL = new THREE.Mesh(new THREE.CylinderGeometry(0.06, 0.06, l*0.7, 8)); pipeL.position.set(-w*0.22, h*0.3, l*0.2); pipeL.rotation.x = Math.PI/2; group.add(pipeL);
                const pipeR = pipeL.clone(); pipeR.position.x = w*0.22; group.add(pipeR);
                // Neon-Laser-Spitzen (Leucht-Effekt)
                const laserTipL = new THREE.Mesh(
                    new THREE.ConeGeometry(0.07, 0.2, 8),
                    new THREE.MeshStandardMaterial({ color: 0xf43f5e, emissive: 0xf43f5e, emissiveIntensity: 1.2 })
                );
                laserTipL.position.set(-w*0.22, h*0.3, l*0.55); laserTipL.rotation.x = Math.PI/2; group.add(laserTipL);
                const laserTipR = laserTipL.clone(); laserTipR.position.x = w*0.22; group.add(laserTipR);
                break;
        }

        // Standard-Noppenverteilung für Triebwerk, Cockpit-Basis und Laser-Kanone
        if(['space_thruster', 'space_cockpit', 'space_laser'].includes(config.shape)) {
            const topStud = new THREE.Mesh(studGeo); topStud.position.set(0, h, 0); group.add(topStud);
        }

        // Schattenberechnung aktivieren
        group.children.forEach(c => { if(c.isMesh) { c.castShadow = true; c.receiveShadow = true; } });
        return group;
    };

    // 3. LEGENDÄRE WELTRAUM-BAUVORLAGE AKTUALISIEREN (BLUEPRINTS REAKTIVIEREN)
    if (window.BlueprintManager) {
        BlueprintManager.blueprints['space_starfighter'] = {
            name: '🌌 Interstellar Starfighter',
            blocks: [
                { type: 'b24', color: 'white', pos: [0, 0, 0], rot: 0 },
                { type: 'sp_cockpit', color: 'blue', pos: [0, 1.2, 0], rot: 0 },
                { type: 'sp_wing_l', color: 'dark_iron', pos: [-1.5, 0, -0.5], rot: 0 },
                { type: 'sp_wing_r', color: 'dark_iron', pos: [1.5, 0, -0.5], rot: 0 },
                { type: 'sp_thruster', color: 'white', pos: [0, 0, -1.5], rot: 0 },
                { type: 'sp_laser_cannon', color: 'white', pos: [0, 0, 1.5], rot: 0 },
                { type: 'sp_antenna', color: 'gold', pos: [0, 1.2, -1.0], rot: 0 }
            ]
        };
        // Re-Init zeichnet das rechte Vorlagen-Panel vollautomatisch wieder auf den Bildschirm!

        'we_ram_horns': { name: 'Widder-Hörner (Paar)', size: [2, 1, 1], category: findWesenKey, shape: 'creature_ram_horns' },
        'we_tail_scaly': { name: 'Echsenschwanz-Glied', size: [1, 2, 1], category: findWesenKey, shape: 'creature_tail' }

        }

    const priorCreatureFactoryChain = GeometryFactory.create;
    GeometryFactory.create = function(brickId) {
        const config = Registry.bricks[brickId];
        const validShapes = [
            'creature_joint', 'creature_claws', 'creature_wing', 'creature_tail', 
            'creature_horn', 'creature_jaw', 'creature_beak', 'creature_tentacle', 
            'creature_furry_tail', 'creature_fin', 'creature_ram_horns'
        ];

        if (!config || !validShapes.includes(config.shape)) {
            return priorCreatureFactoryChain(brickId);
        }

        const w = config.size[0] * App.spatialUnit;
        const l = config.size[1] * App.spatialUnit;
        const h = config.size[2] * App.spatialHeight;
        const group = new THREE.Group();
        let geo;

        const studGeo = new THREE.CylinderGeometry(0.16, 0.16, 0.08, 12); studGeo.translate(0, 0.04, 0);

        switch(config.shape) {
            case 'creature_joint':
                const plateBox = new THREE.Mesh(new THREE.BoxGeometry(w - 0.03, h, l - 0.03)); plateBox.position.y = h/2; group.add(plateBox);
                const jointNeck = new THREE.Mesh(new THREE.CylinderGeometry(0.06, 0.06, 0.2, 8)); jointNeck.position.set(0, h/2, l/2 + 0.1); jointNeck.rotation.x = Math.PI/2; group.add(jointNeck);
                const jointBall = new THREE.Mesh(new THREE.SphereGeometry(0.16, 12, 12), new THREE.MeshStandardMaterial({ color: 0x94a3b8, roughness: 0.4 })); jointBall.position.set(0, h/2, l/2 + 0.2); group.add(jointBall);
                break;

            case 'creature_claws':
                const footBase = new THREE.Mesh(new THREE.BoxGeometry(w - 0.05, h * 0.5, l - 0.05)); footBase.position.y = (h*0.5)/2; group.add(footBase);
                for(let i = -0.33; i <= 0.33; i += 0.33) {
                    const claw = new THREE.Mesh(new THREE.ConeGeometry(0.08, h * 0.6, 8));
                    claw.position.set(i * w, h * 0.2, l/2); claw.rotation.x = Math.PI / 2.5;
                    group.add(claw);
                }
                break;

            case 'creature_jaw':
                const jawBase = new THREE.Mesh(new THREE.BoxGeometry(w-0.03, h*0.4, l-0.03)); jawBase.position.y = (h*0.4)/2; group.add(jawBase);
                const toothGeo = new THREE.ConeGeometry(0.05, h*0.5, 6);
                const toothMat = new THREE.MeshStandardMaterial({ color: 0xf8fafc, roughness: 0.2 });
                for (let z = -0.3; z <= 0.3; z += 0.2) {
                    const toothL = new THREE.Mesh(toothGeo, toothMat); toothL.position.set(-w*0.35, h*0.4, z*l); group.add(toothL);
                    const toothR = new THREE.Mesh(toothGeo, toothMat); toothR.position.set(w*0.35, h*0.4, z*l); group.add(toothR);
                }
                break;

            case 'creature_beak':
                const beakShape = new THREE.Shape();
                beakShape.moveTo(-w/2, h/2); beakShape.lineTo(w/2, h/2); beakShape.quadraticCurveTo(w/2, -h/4, 0, -h/2); beakShape.lineTo(-w/2, h/2);
                geo = new THREE.ExtrudeGeometry(beakShape, { depth: l * 0.8, bevelEnabled: false });
                geo.center(); geo.rotateY(Math.PI / 2); geo.translate(0, h/2, l/4);
                group.add(new THREE.Mesh(geo));
                break;

            case 'creature_tentacle':
                const segments = 5;
                for (let i = 0; i < segments; i++) {
                    const progress = i / segments;
                    const radius = (w * 0.35) * (1 - progress * 0.6);
                    const segH = h / segments;
                    const segMesh = new THREE.Mesh(new THREE.CylinderGeometry(radius * 0.8, radius, segH, 10));
                    segMesh.position.set(Math.sin(i * 1.2) * 0.15, (segH * i) + segH/2, i * 0.05);
                    segMesh.rotation.z = Math.cos(i * 1.2) * 0.2;
                    group.add(segMesh);
                }
                break;

            case 'creature_furry_tail':
                const tailCenter = new THREE.Mesh(new THREE.SphereGeometry(w * 0.4, 12, 12));
                tailCenter.scale.set(1.0, 1.8, 1.0); tailCenter.position.set(0, h * 0.4, -l * 0.2);
                tailCenter.rotation.x = -0.5; group.add(tailCenter);
                const tipMesh = new THREE.Mesh(new THREE.ConeGeometry(w * 0.25, h * 0.5, 10), new THREE.MeshStandardMaterial({ color: 0xf1f5f9, roughness: 0.7 }));
                tipMesh.position.set(0, h * 1.0, -l * 0.6); tipMesh.rotation.x = -0.8;
                group.add(tipMesh);
                break;

            case 'creature_fin':
                const finShape = new THREE.Shape();
                finShape.moveTo(-l/2, -h/2); finShape.quadraticCurveTo(l/4, -h/2, l/2, h/2); finShape.quadraticCurveTo(0, h/4, -l/2, -h/2);
                geo = new THREE.ExtrudeGeometry(finShape, { depth: w * 0.2, bevelEnabled: false });
                geo.center(); geo.rotateY(Math.PI / 2); geo.translate(0, h/2, 0);
                group.add(new THREE.Mesh(geo));
                return group;

            case 'creature_ram_horns':
                const hornMat = new THREE.MeshStandardMaterial({ color: 0xfef08a, roughness: 0.5 });
                for(let side = -1; side <= 1; side += 2) {
                    if (side === 0) continue;
                    const hornGroup = new THREE.Group();
                    const hornGeo = new THREE.TorusGeometry(w * 0.25, 0.08, 8, 16, Math.PI * 1.2);
                    const hornMesh = new THREE.Mesh(hornGeo, hornMat);
                    hornMesh.rotation.y = side * Math.PI / 2;
                    hornGroup.add(hornMesh);
                    hornGroup.position.set(side * (w * 0.45), h * 0.6, 0);
                    group.add(hornGroup);
                }
                break;

            case 'creature_tail':
                geo = new THREE.CylinderGeometry(w * 0.2, w * 0.42, l, 12); geo.rotateX(Math.PI / 2); geo.translate(0, h/2, 0);
                group.add(new THREE.Mesh(geo));
                break;
        }

        if(['creature_beak', 'creature_ram_horns', 'creature_furry_tail', 'creature_tail', 'creature_joint'].includes(config.shape)) {
            const topStud = new THREE.Mesh(studGeo); topStud.position.set(0, h, 0); group.add(topStud);
        }

        group.children.forEach(c => { if(c.isMesh) { c.castShadow = true; c.receiveShadow = true; } });
        return group;
    };

    // 4. AKTUALISIERUNG DER UEBERSICHT
    if (window.UIManager) {
        // Erzwingt, dass die Liste neu aufgebaut wird, falls du den Tab schon offen hast
        UIManager.renderBricks('standard'); 
    }

    console.log("💚 Alle neuen Wesen-Sonderteile wurden erfolgreich mit deinem System synchronisiert!");
})();

        const group = new THREE.Group();
        let geo;

        const studGeo = new THREE.CylinderGeometry(0.16, 0.16, 0.08, 12); studGeo.translate(0, 0.04, 0);
        
        // SOTA Future-Materialien definieren

        const darkCarbonMat = new THREE.MeshStandardMaterial({ color: 0x1e293b, roughness: 0.5, metalness: 0.2 });
